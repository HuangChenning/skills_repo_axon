# 深度爬取配置示例

output_dir: "site_content"
max_workers: 4
timeout: 30
crawl_delay: 1

url: "https://example.com/docs"

crawl:
  depth: 2
  same_domain: true
  delay: 1

scope:
  allow_domains:
    - "example.com"
  allow_paths:
    - "/docs/"
    - "/guides/"
  deny_paths:
    - "/docs/api/"
    - "/docs/deprecated/"
    - "/admin/"

filter:
  enable_similar: true
  similarity_threshold: 0.90

extraction:
  remove_selectors:
    - "nav"
    - "header"
    - "footer"
    - ".sidebar"
    - ".navigation"
    - ".advertisement"

output:
  add_metadata: true
  images: "markdown"
