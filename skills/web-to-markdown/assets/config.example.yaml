# Web to Markdown 配置文件示例
# 使用方法: python3 converter.py --config config.yaml

# ============================================
# 基础设置
# ============================================

# 输出目录
output_dir: "markdown_output"

# 请求超时时间（秒）
timeout: 30

# 并发下载数量
max_workers: 4

# 最大重试次数
max_retries: 3

# 搜索关键词（逗号分隔）
keywords: ""

# 自定义 User-Agent
# user_agent: "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)"

# ============================================
# URL 来源（三选一）
# ============================================

# 单个 URL
url: "https://example.com"

# 从文件批量读取
# batch: "urls.txt"

# 从 sitemap 获取
# sitemap: "https://example.com/sitemap.xml"

# ============================================
# URL 范围控制
# ============================================

scope:
  # 域名白名单（逗号分隔）
  allow_domains:
    - "docs.python.org"
    - "github.com"

  # 域名黑名单
  deny_domains:
    - "ads.example.com"
    - "tracker.example.com"

  # 路径白名单（只处理这些路径前缀）
  allow_paths:
    - "/3/tutorial/"
    - "/3/library/"

  # 路径黑名单（不处理这些路径前缀）
  deny_paths:
    - "/3/api/"
    - "/3/reference/"
    - "/admin/"

  # 允许 URL 的正则表达式
  # allow_regex: "https://docs\\.python\\.org/3/.*tutorial.*"

  # 拒绝 URL 的正则表达式
  # deny_regex: ".*(deprecated|archived).*"

# ============================================
# 深度爬取设置
# ============================================

crawl:
  # 爬取深度（0 = 只爬起始页）
  depth: 1

  # 只爬取同域名下的链接
  same_domain: true

  # 请求间隔时间（秒）
  delay: 0.5

# ============================================
# URL 过滤设置
# ============================================

filter:
  # 启用相似 URL 过滤（去重）
  enable_similar: false

  # 相似度阈值（0-1）
  similarity_threshold: 0.95

  # 禁用跟踪参数自动移除
  disable_tracking: false

# 关键字黑名单（过滤包含这些关键字的 URL）
# keyword_blacklist: "deprecated,archived,old"

# 启用详细统计功能，生成统计报告
# enable_stats: false

# 文件内容查重阈值（0.0-1.0）
# 超过此阈值则视为重复文件，只保留一份
# 设置为 0.95 表示两个文件内容相似度 >= 95% 时视为重复
# 设置为 0.0 表示禁用查重功能
# duplicate_threshold: 0.95

# ============================================
# 输出设置
# ============================================

output:
  # 是否添加元数据头部
  add_metadata: true

  # 是否清理链接中的换行符
  clean_links: true

  # 图片处理方式
  # options: keep, markdown, alt-text
  images: "markdown"

# ============================================
# 内容提取设置
# ============================================

extraction:
  # 主要内容选择器（CSS 选择器）
  # 留空自动检测
  content_selector: ""

  # 移除的元素选择器
  remove_selectors:
    - "script"
    - "style"
    - "nav"
    - "header"
    - "footer"
    - ".advertisement"
    - ".sidebar"

  # 保留的元素（即使在被移除的选择器内）
  preserve_selectors:
    - "main article"
    - ".content"

# ============================================
# 高级设置
# ============================================

advanced:
  # 是否保存原始 HTML
  save_html: false

  # 是否跳过已存在的文件
  skip_existing: true

  # 文件名处理
  filename:
    # 最大长度
    max_length: 200

    # 替换规则
    replacements:
      - pattern: "[<>:\"/\\\\|?*]"
        replacement: "_"
      - pattern: "\\s+"
        replacement: " "

# ============================================
# 日志设置
# ============================================

logging:
  # 日志级别: DEBUG, INFO, WARNING, ERROR
  level: "INFO"

  # 是否显示详细进度
  verbose: true

# ============================================
# 使用示例
# ============================================

# 示例 1: 爬取 Python 文档
# python3 converter.py --config python_docs_config.yaml

# 示例 2: 配合命令行参数覆盖
# python3 converter.py --config config.yaml --max-workers 8
# (命令行参数会覆盖配置文件中的设置)
