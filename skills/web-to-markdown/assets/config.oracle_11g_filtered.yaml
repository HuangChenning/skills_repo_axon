# Oracle 11g 文章爬取配置（带关键字过滤）
# 爬取包含 11g 关键字的文章，但排除 11gr1、11gR1、windows 相关内容

# ============================================
# 基础设置
# ============================================

# 输出目录（相对于项目根目录）
output_dir: "oracle_11g_articles"

# 请求超时时间（秒）
timeout: 30

# 并发下载数量
max_workers: 8

# 最大重试次数
max_retries: 3

# 搜索关键词（逗号分隔）
keywords: "11g"

# ============================================
# URL 来源
# ============================================

url: "https://oracle-base.com/articles/11g/"

# ============================================
# URL 范围控制
# ============================================

scope:
  # 域名白名单
  allow_domains:
    - "oracle-base.com"
    - "www.oracle-base.com"

  # 路径白名单
  allow_paths:
    - "/articles/11g/"

  # 路径黑名单
  deny_paths:
    - "/articles/11g/articles/"
    - "/tag/"
    - "/category/"
    - "/author/"
    - "/comments/"
    - "/feed"

# ============================================
# 深度爬取设置
# ============================================

crawl:
  # 爬取深度（1 = 起始页 + 直接链接）
  depth: 2

  # 只爬取同域名
  same_domain: true

  # 请求间隔（秒）
  delay: 0.3

# ============================================
# URL 过滤设置
# ============================================

filter:
  # 禁用相似度过滤（获取所有不同版本的文章）
  enable_similar: false

  # 启用跟踪参数移除
  disable_tracking: false

# ============================================
# 关键字黑名单（新增功能）
# ============================================

# 过滤掉包含这些关键字的文章
keyword_blacklist: "11gr1,11gR1,windows"

# ============================================
# 内容提取设置
# ============================================

extraction:
  # 主要内容选择器
  content_selector: "article, .post-content, .entry-content, main"

  # 移除的元素选择器
  remove_selectors:
    - "nav"
    - "header"
    - "footer"
    - ".sidebar"
    - ".navigation"
    - ".advertisement"

# ============================================
# 输出设置
# ============================================

output:
  # 添加元数据头部
  add_metadata: true

  # 图片处理方式
  images: "markdown"

# ============================================
# 统计设置
# ============================================

# 启用详细统计功能，生成统计报告
enable_stats: true

# ============================================
# 文件查重设置
# ============================================

# 文件内容查重阈值（0.0-1.0）
# 超过此阈值则视为重复文件，只保留一份
# 设置为 0.95 表示两个文件内容相似度 >= 95% 时视为重复
# 设置为 0.0 表示禁用查重功能
duplicate_threshold: 0.95

# ============================================
# 日志设置
# ============================================

logging:
  # 日志级别
  level: "INFO"

  # 显示详细进度
  verbose: true
