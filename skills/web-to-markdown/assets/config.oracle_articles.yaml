# Oracle 文章批量爬取配置

output_dir: "oracle_articles"
max_workers: 8
timeout: 45

batch: "oracle_urls.txt"

scope:
  allow_domains:
    - "oracle-base.com"
  allow_paths:
    - "/articles/11g/"
  deny_regex: ".*(comments|login|register).*"

filter:
  enable_similar: true

logging:
  level: "INFO"
  verbose: true
