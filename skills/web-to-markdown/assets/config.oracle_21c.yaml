# Oracle 21c 文档爬取配置

# 输出目录
output_dir: "oracle_21c_docs"

# 并发设置
max_workers: 6
timeout: 45

# 起始 URL
url: "https://oracle-base.com/articles/21c/articles-21c"

# URL 范围控制
scope:
  allow_domains:
    - "oracle-base.com"
  allow_paths:
    - "/articles/21c/"
  deny_regex: ".*(comments|login|register|feed|tag).*"

# 深度爬取设置
crawl:
  depth: 1
  same_domain: true
  delay: 0.5

# 过滤设置
filter:
  enable_similar: true
  similarity_threshold: 0.90

# 日志设置
logging:
  level: "INFO"
  verbose: true

# 启用详细统计
enable_stats: true
